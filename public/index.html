<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GraceBot – Church Assistant</title>

  <!-- Fonts: elegant serif for headings + clean sans for chat -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Spiritual, warm palette */
      --bg: #fdfbf7;               /* soft cream */
      --surface: #fffef9;          /* slightly warmer white */
      --surface-alt: #f7f3ea;      /* very light sand */
      --border: #e0d6c2;           /* soft tan */
      --gold: #c9a44b;
      --gold-dark: #b28b3c;
      --text-primary: #3b2e1e;     /* deep brown */
      --text-secondary: #7b6e5d;   /* muted taupe */
      --accent: #8b6f4c;           /* warm bronze */
      --send-bg: var(--gold);
      --send-hover: var(--gold-dark);
      --you-bg: #e7d7b8;           /* light gold for user bubbles */
      --ai-bg: #f9f6f0;            /* slightly off-white for AI */
      --ai-border: #dacba4;
      --radius-msg: 20px;
      --radius-sm: 10px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      background-image: radial-gradient(circle at 20% 30%, rgba(201, 164, 75, 0.06) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(139, 111, 76, 0.05) 0%, transparent 50%);
    }

    /* ── Outer shell ── */
    .chat-shell {
      width: 100%;
      max-width: 580px;
      height: min(700px, 92vh);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 32px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(201, 164, 75, 0.12),
        0 20px 50px rgba(59, 46, 30, 0.15);
    }

    /* ── Header ── */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 22px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #fcf9f2 0%, #f8f2e4 100%);
      flex-shrink: 0;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #f7e3af, var(--gold-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 10px rgba(201, 164, 75, 0.3);
    }

    /* Simple cross icon */
    .avatar svg {
      width: 24px;
      height: 24px;
      fill: #fff;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
    }

    .header-info h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: #3b2e1e;
      letter-spacing: 0.3px;
    }

    .header-info span {
      font-size: 0.8rem;
      color: #6f8c5d; /* gentle olive-green for "online" */
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    .online-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #6f8c5d;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* ── Messages area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      background: var(--surface);
    }

    #messages::-webkit-scrollbar {
      width: 5px;
    }
    #messages::-webkit-scrollbar-track {
      background: transparent;
    }
    #messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 8px;
    }

    /* date divider */
    .date-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0;
    }
    .date-divider::before,
    .date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .date-divider span {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    /* ── Message rows ── */
    .message-row {
      display: flex;
      flex-direction: column;
      max-width: 82%;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-row.you {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message-row.ai {
      align-self: flex-start;
      align-items: flex-start;
    }

    /* sender label */
    .message-row .sender-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .message-row.you .sender-label {
      color: var(--accent);
    }

    /* bubble */
    .bubble {
      padding: 10px 15px;
      border-radius: var(--radius-msg);
      font-size: 0.95rem;
      line-height: 1.55;
      position: relative;
      word-break: break-word;
      font-family: 'Inter', sans-serif;
    }

    .message-row.you .bubble {
      background: var(--you-bg);
      color: #2e2416;
      border-bottom-right-radius: var(--radius-sm);
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }

    .message-row.ai .bubble {
      background: var(--ai-bg);
      color: var(--text-primary);
      border: 1px solid var(--ai-border);
      border-bottom-left-radius: var(--radius-sm);
    }

    /* timestamp */
    .timestamp {
      font-size: 0.65rem;
      color: var(--text-secondary);
      margin-top: 4px;
      padding: 0 4px;
    }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--ai-bg);
      border: 1px solid var(--ai-border);
      border-radius: var(--radius-msg);
      border-bottom-left-radius: var(--radius-sm);
      width: fit-content;
      margin-top: 4px;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: var(--gold);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-7px); }
    }

    /* ── Input area ── */
    .chat-footer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201, 164, 75, 0.15);
    }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text-primary);
      padding: 12px 0;
      caret-color: var(--accent);
    }

    #userInput::placeholder {
      color: var(--text-secondary);
      font-style: italic;
    }

    #sendBtn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--send-bg);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    #sendBtn:hover {
      background: var(--send-hover);
    }

    #sendBtn:active {
      transform: scale(0.93);
    }

    #sendBtn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    #sendBtn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body {
        padding: 0;
        align-items: flex-end;
      }
      .chat-shell {
        max-width: 100%;
        height: 100vh;
        border-radius: 0;
        border: none;
      }
      .message-row {
        max-width: 88%;
      }
    }
  </style>
</head>
<body>
  <div class="chat-shell">
    <!-- Header -->
    <div class="chat-header">
      <div class="avatar">
        <!-- Simple cross SVG -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 6.5v-1.5h-5v-3h-2v3h-5v1.5h5v5h-5v1.5h5v9h2v-9h5v-1.5h-5v-5z" fill="white"/>
        </svg>
      </div>
      <div class="header-info">
        <h2>GraceBot</h2>
        <span><span class="online-dot"></span>Here to help</span>
      </div>
    </div>

    <!-- Messages container -->
    <div id="messages">
      <!-- Date divider -->
      <div class="date-divider"><span>Today</span></div>
      <!-- Initial greeting from AI -->
      <div class="message-row ai">
        <span class="sender-label">GraceBot</span>
        <div class="bubble">Peace be with you! How can I assist you today? 🙏</div>
        <span class="timestamp" id="initialTimestamp"></span>
      </div>
    </div>

    <!-- Input area -->
    <div class="chat-footer">
      <div class="input-wrap">
        <input
          type="text"
          id="userInput"
          placeholder="Ask a question about faith, events, or prayer…"
          autocomplete="off"
        />
      </div>
      <button id="sendBtn" aria-label="Send message">
        <!-- Send icon (paper plane) -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
        </svg>
      </button>
    </div>
  </div>

  <script>
    (function() {
      // ── DOM elements ──
      const messagesEl = document.getElementById('messages');
      const input = document.getElementById('userInput');
      const sendBtn = document.getElementById('sendBtn');
      const initialTimestamp = document.getElementById('initialTimestamp');

      // Set initial message time on load
      initialTimestamp.textContent = getTimeNow();

      // ── Helper: current time formatted ──
      function getTimeNow() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      // ── Add a message to the chat ──
      function addMessage(text, sender) {
        const row = document.createElement('div');
        row.className = `message-row ${sender}`; // 'you' or 'ai'

        const label = document.createElement('span');
        label.className = 'sender-label';
        label.textContent = sender === 'you' ? 'You' : 'GraceBot';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        // support simple line breaks (if backend sends \n)
        bubble.innerHTML = text.replace(/\n/g, '<br>');

        const timeSpan = document.createElement('span');
        timeSpan.className = 'timestamp';
        timeSpan.textContent = getTimeNow();

        row.appendChild(label);
        row.appendChild(bubble);
        row.appendChild(timeSpan);
        messagesEl.appendChild(row);
        scrollToBottom();
      }

      // ── Show typing indicator ──
      function showTypingIndicator() {
        const indicator = document.createElement('div');
        indicator.className = 'message-row ai';
        indicator.id = 'typingIndicator';

        const label = document.createElement('span');
        label.className = 'sender-label';
        label.textContent = 'GraceBot';

        const dots = document.createElement('div');
        dots.className = 'typing-indicator';
        dots.innerHTML = '<span></span><span></span><span></span>';

        indicator.appendChild(label);
        indicator.appendChild(dots);
        messagesEl.appendChild(indicator);
        scrollToBottom();
      }

      function removeTypingIndicator() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
      }

      // ── Scroll to latest message ──
      function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      // ── Disable input while waiting for response ──
      function setLoadingState(isLoading) {
        input.disabled = isLoading;
        sendBtn.disabled = isLoading;
        if (!isLoading) input.focus();
      }

      // ── Send message to backend ──
      async function sendMessage() {
        const text = input.value.trim();
        if (!text || input.disabled) return;

        // Add user message
        addMessage(text, 'you');
        input.value = '';
        setLoadingState(true);

        // Show typing indicator
        showTypingIndicator();

        try {
          // ============================================================
          // 🔌 REPLACE THIS URL with your actual RAG backend endpoint
          // Expects: POST { "message": "user text" }
          // Returns: JSON { "reply": "AI answer" }
          // ============================================================
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text }),
          });

          if (!response.ok) throw new Error(`Server error ${response.status}`);

          const data = await response.json();
          const aiReply = data.reply || data.response || 'I’m sorry, I didn’t catch that. Could you rephrase?';

          // Remove typing indicator then show the real reply
          removeTypingIndicator();
          addMessage(aiReply, 'ai');
        } catch (error) {
          console.error('Chat error:', error);
          removeTypingIndicator();
          addMessage('I’m having trouble connecting right now. Please try again later. 🙏', 'ai');
        } finally {
          setLoadingState(false);
        }
      }

      // ── Event listeners ──
      sendBtn.addEventListener('click', sendMessage);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // Auto-focus input on load
      input.focus();
    })();
  </script>
</body>
</html>
