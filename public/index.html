<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FBC OVOM – Marriage Guidelines</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Light theme (default) */
    :root {
      --bg: #fdfbf7;
      --surface: #fffef9;
      --surface-alt: #f7f3ea;
      --border: #e0d6c2;
      --gold: #c9a44b;
      --gold-dark: #b28b3c;
      --text-primary: #3b2e1e;
      --text-secondary: #7b6e5d;
      --accent: #8b6f4c;
      --send-bg: var(--gold);
      --send-hover: var(--gold-dark);
      --you-bg: #e7d7b8;
      --ai-bg: #f9f6f0;
      --ai-border: #dacba4;
      --header-bg: linear-gradient(135deg, #fcf9f2, #f8f2e4);
      --shadow: 0 2px 8px rgba(201, 164, 75, 0.3);
    }

    /* Dark theme */
    [data-theme="dark"] {
      --bg: #1a1814;
      --surface: #24211b;
      --surface-alt: #2e2a22;
      --border: #3d372c;
      --gold: #d4af5e;
      --gold-dark: #c19a4a;
      --text-primary: #e6dccf;
      --text-secondary: #a89e8b;
      --accent: #c9a44b;
      --send-bg: var(--gold);
      --send-hover: var(--gold-dark);
      --you-bg: #3a3326;
      --ai-bg: #2b2720;
      --ai-border: #4a4234;
      --header-bg: linear-gradient(135deg, #2b2720, #221f18);
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .top-header {
      height: 64px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
      gap: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cross-icon {
      width: 36px;
      height: 36px;
      background: radial-gradient(circle at 30% 30%, #f7e3af, var(--gold-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }

    .cross-icon svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .header-text h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.3px;
      line-height: 1.2;
    }

    .header-text span {
      font-size: 0.75rem;
      color: var(--text-secondary);
      display: block;
      font-style: italic;
    }

    /* Theme toggle button */
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-primary);
      transition: background 0.2s, color 0.2s;
    }

    .theme-toggle:hover {
      background: var(--surface-alt);
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      min-width: 0;
      min-height: 0;
      /* crucial for scrolling */
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      min-height: 0;
      /* crucial for scrolling */
    }

    .messages::-webkit-scrollbar {
      width: 5px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 8px;
    }

    .date-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0;
    }

    .date-divider::before,
    .date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .date-divider span {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    .message-row {
      display: flex;
      flex-direction: column;
      max-width: 75%;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-row.you {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message-row.ai {
      align-self: flex-start;
      align-items: flex-start;
    }

    .sender-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .message-row.you .sender-label {
      color: var(--accent);
    }

    .bubble {
      padding: 10px 15px;
      border-radius: 20px;
      font-size: 0.95rem;
      line-height: 1.55;
      word-break: break-word;
    }

    /* Styled content inside AI bubble */
    .bubble p {
      margin-bottom: 0.5rem;
    }

    .bubble ul,
    .bubble ol {
      margin: 0.5rem 0 0.5rem 1.2rem;
    }

    .bubble li {
      margin-bottom: 0.2rem;
    }

    .bubble strong {
      font-weight: 600;
    }

    .bubble em {
      font-style: italic;
      color: var(--accent);
    }

    .message-row.you .bubble {
      background: var(--you-bg);
      color: var(--text-primary);
      border-bottom-right-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
    }

    .message-row.ai .bubble {
      background: var(--ai-bg);
      color: var(--text-primary);
      border: 1px solid var(--ai-border);
      border-bottom-left-radius: 10px;
    }

    .timestamp {
      font-size: 0.65rem;
      color: var(--text-secondary);
      margin-top: 4px;
      padding: 0 4px;
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--ai-bg);
      border: 1px solid var(--ai-border);
      border-radius: 20px;
      border-bottom-left-radius: 10px;
      width: fit-content;
      margin-top: 4px;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: var(--gold);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
      }

      30% {
        transform: translateY(-7px);
      }
    }

    .chat-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
    }

    .input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201, 164, 75, 0.15);
    }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text-primary);
      padding: 12px 0;
      caret-color: var(--accent);
    }

    #userInput::placeholder {
      color: var(--text-secondary);
      font-style: italic;
    }

    #sendBtn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--send-bg);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    #sendBtn:hover {
      background: var(--send-hover);
    }

    #sendBtn:active {
      transform: scale(0.93);
    }

    #sendBtn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    #sendBtn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .message-row {
        max-width: 88%;
      }
    }
  </style>
</head>

<body>
  <!-- Header -->
  <header class="top-header">
    <div class="header-left">
      <div class="cross-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 6.5v-1.5h-5v-3h-2v3h-5v1.5h5v5h-5v1.5h5v9h2v-9h5v-1.5h-5v-5z" fill="white" />
        </svg>
      </div>
      <div class="header-text">
        <h1>FBC OVOM Marriage Guidelines</h1>
        <span>Your step‑by‑step assistant</span>
      </div>
    </div>

    <!-- Theme toggle button -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
      <!-- Sun icon (visible in dark mode) -->
      <svg id="sunIcon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="1" x2="12" y2="3" />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1" y1="12" x2="3" y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
      </svg>
      <!-- Moon icon (visible in light mode) -->
      <svg id="moonIcon" viewBox="0 0 24 24" style="display: none;">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
    </button>
  </header>

  <!-- Chat area -->
  <main class="chat-container">
    <div class="messages" id="messages">
      <div class="date-divider"><span>Today</span></div>
      <div class="message-row ai">
        <span class="sender-label">Guidelines Bot</span>
        <div class="bubble">
          Welcome! 🙏 I can walk you through the official <strong>FBC OVOM marriage steps</strong>.<br>How may I help
          you?
        </div>
        <span class="timestamp" id="initialTimestamp"></span>
      </div>
    </div>

    <div class="chat-footer">
      <div class="input-wrap">
        <input type="text" id="userInput" placeholder="Ask about marriage requirements, steps, or documents…"
          autocomplete="off" />
      </div>
      <button id="sendBtn" aria-label="Send message">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
        </svg>
      </button>
    </div>
  </main>

  <script>
    (function () {
      (function () {
        const messagesEl = document.getElementById('messages');
        const input = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const initialTimestamp = document.getElementById('initialTimestamp');

        // Conversation memory
        const conversationHistory = [];

        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        const html = document.documentElement;

        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        updateIcons(savedTheme);

        themeToggle.addEventListener('click', () => {
          const current = html.getAttribute('data-theme');
          const next = current === 'light' ? 'dark' : 'light';
          html.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          updateIcons(next);
        });

        function updateIcons(theme) {
          if (theme === 'dark') {
            sunIcon.style.display = 'block';
            moonIcon.style.display = 'none';
          } else {
            sunIcon.style.display = 'none';
            moonIcon.style.display = 'block';
          }
        }

        initialTimestamp.textContent = getTimeNow();

        function getTimeNow() {
          return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function formatResponse(text) {
          let safe = text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');

          safe = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
          safe = safe.replace(/\*(.+?)\*/g, '<em>$1</em>');

          const paragraphs = safe.split(/\n\n+/);
          const formatted = paragraphs.map(para => {
            const lines = para.split('\n');
            const isUnordered = lines.every(line => /^[-*] .+/.test(line.trim()));
            const isOrdered = lines.every(line => /^\d+\. .+/.test(line.trim()));

            if (isUnordered) {
              const items = lines.map(line => `<li>${line.replace(/^[-*] /, '')}</li>`).join('');
              return `<ul>${items}</ul>`;
            } else if (isOrdered) {
              const items = lines.map(line => `<li>${line.replace(/^\d+\. /, '')}</li>`).join('');
              return `<ol>${items}</ol>`;
            } else {
              return `<p>${lines.join('<br>')}</p>`;
            }
          }).join('');

          return formatted;
        }

        function addMessage(text, sender) {
          const row = document.createElement('div');
          row.className = `message-row ${sender}`;

          const label = document.createElement('span');
          label.className = 'sender-label';
          label.textContent = sender === 'you' ? 'You' : 'Guidelines Bot';

          const bubble = document.createElement('div');
          bubble.className = 'bubble';

          if (sender === 'ai') {
            bubble.innerHTML = formatResponse(text);
          } else {
            bubble.innerHTML = text.replace(/\n/g, '<br>');
          }

          const time = document.createElement('span');
          time.className = 'timestamp';
          time.textContent = getTimeNow();

          row.appendChild(label);
          row.appendChild(bubble);
          row.appendChild(time);
          messagesEl.appendChild(row);
          scrollToBottom();
        }

        function showTypingIndicator() {
          const indicator = document.createElement('div');
          indicator.className = 'message-row ai';
          indicator.id = 'typingIndicator';

          const label = document.createElement('span');
          label.className = 'sender-label';
          label.textContent = 'Guidelines Bot';

          const dots = document.createElement('div');
          dots.className = 'typing-indicator';
          dots.innerHTML = '<span></span><span></span><span></span>';

          indicator.appendChild(label);
          indicator.appendChild(dots);
          messagesEl.appendChild(indicator);
          scrollToBottom();
        }

        function removeTypingIndicator() {
          const el = document.getElementById('typingIndicator');
          if (el) el.remove();
        }

        function scrollToBottom() {
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function setLoadingState(isLoading) {
          input.disabled = isLoading;
          sendBtn.disabled = isLoading;
          if (!isLoading) input.focus();
        }

        async function sendMessage() {
          const text = input.value.trim();
          if (!text || input.disabled) return;

          addMessage(text, 'you');
          conversationHistory.push({ role: 'user_input', content: [{ type: "text", text: text }] });

          input.value = '';
          setLoadingState(true);
          showTypingIndicator();

          try {
            console.log('Sending conversation history to server:', conversationHistory);
            const response = await fetch('/api/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                message: text,
                history: conversationHistory
              }),
            });

            if (!response.ok) throw new Error(`Server error ${response.status}`);

            const data = await response.json();
            const aiReply = data.reply || data.response || 'I’m sorry, I could not retrieve that information.';
console.log('Received reply from server:', aiReply);
            conversationHistory.push({ role: 'model_output', content:  [{ type: "text", text: aiReply }]});



            removeTypingIndicator();
            addMessage(aiReply, 'ai');
          } catch (error) {
            console.error(error);
            removeTypingIndicator();
            addMessage('I’m having trouble connecting right now. Please try again later. 🙏', 'ai');
          } finally {
            setLoadingState(false);
          }
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
          }
        });

        input.focus();
      })();
    })();
  </script>
</body>

</html>
