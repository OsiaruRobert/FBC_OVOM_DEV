<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FBC OVOM – Marriage Guidelines</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet" />

    <link rel="shortcut icon" href="./logo1.jpg" type="image/x-icon">
<link rel="apple-touch-icon" href="./logo1.jpg">
<style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Light theme (default) */
    :root {
      --bg: #fdfbf7;
      --surface: #fffef9;
      --surface-alt: #f7f3ea;
      --border: #e0d6c2;
      --gold: #c9a44b;
      --gold-dark: #b28b3c;
      --text-primary: #3b2e1e;
      --text-secondary: #7b6e5d;
      --accent: #8b6f4c;
      --send-bg: var(--gold);
      --send-hover: var(--gold-dark);
      --you-bg: #e7d7b8;
      --ai-bg: #f9f6f0;
      --ai-border: #dacba4;
      --header-bg: linear-gradient(135deg, #fcf9f2, #f8f2e4);
      --shadow: 0 2px 8px rgba(201, 164, 75, 0.3);
    }

    /* Dark theme */
    [data-theme="dark"] {
      --bg: #1a1814;
      --surface: #24211b;
      --surface-alt: #2e2a22;
      --border: #3d372c;
      --gold: #d4af5e;
      --gold-dark: #c19a4a;
      --text-primary: #e6dccf;
      --text-secondary: #a89e8b;
      --accent: #c9a44b;
      --send-bg: var(--gold);
      --send-hover: var(--gold-dark);
      --you-bg: #3a3326;
      --ai-bg: #2b2720;
      --ai-border: #4a4234;
      --header-bg: linear-gradient(135deg, #2b2720, #221f18);
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    html {
      /* Prevent tap highlight on mobile */
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      /* Use dvh (dynamic viewport height) so mobile browser chrome is accounted for.
         Falls back to 100vh for older browsers. */
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      /* Safe area insets for notched phones (iPhone, etc.) */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* ── Header ── */
    .top-header {
      /* Flexible height so it can shrink on small screens */
      min-height: 56px;
      height: auto;
      padding: 10px 16px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0; /* allows text truncation */
    }

    .cross-icon {
      width: 34px;
      height: 34px;
      min-width: 34px; /* prevent shrinking */
      background: radial-gradient(circle at 30% 30%, #f7e3af, var(--gold-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
    }

    .cross-icon svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .header-text {
      min-width: 0; /* allows truncation inside flex */
    }

    .header-text h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 4vw, 1.4rem); /* scales with screen */
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.3px;
      line-height: 1.2;
      /* Truncate if truly too long */
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-text span {
      font-size: 0.7rem;
      color: var(--text-secondary);
      display: block;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Theme toggle */
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 38px;
      height: 38px;
      min-width: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-primary);
      transition: background 0.2s;
    }

    .theme-toggle:hover {
      background: var(--surface-alt);
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Chat container ── */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      min-width: 50px;
      min-height: 0;
      overflow: hidden;

      max-width: 1024px;
      margin: auto;
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      /* Momentum scrolling on iOS */
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
      min-height: 0;
    }

    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 8px;
    }

    .date-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 6px 0;
    }

    .date-divider::before,
    .date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .date-divider span {
      font-size: 0.65rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    .message-row {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-row.you {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message-row.ai {
      align-self: flex-start;
      align-items: flex-start;
    }

    .sender-label {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 3px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .message-row.you .sender-label {
      color: var(--accent);
    }

    .bubble {
      padding: 9px 13px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.55;
      word-break: break-word;
    }

    .bubble p        { margin-bottom: 0.4rem; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul,
    .bubble ol       { margin: 0.4rem 0 0.4rem 1.1rem; }
    .bubble li       { margin-bottom: 0.2rem; }
    .bubble strong   { font-weight: 600; }
    .bubble em       { font-style: italic; color: var(--accent); }

    .message-row.you .bubble {
      background: var(--you-bg);
      color: var(--text-primary);
      border-bottom-right-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .message-row.ai .bubble {
      background: var(--ai-bg);
      color: var(--text-primary);
      border: 1px solid var(--ai-border);
      border-bottom-left-radius: 6px;
    }

    .timestamp {
      font-size: 0.6rem;
      color: var(--text-secondary);
      margin-top: 3px;
      padding: 0 3px;
    }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 13px;
      background: var(--ai-bg);
      border: 1px solid var(--ai-border);
      border-radius: 18px;
      border-bottom-left-radius: 6px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: var(--gold);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-6px); }
    }

    /* ── Footer / input ── */
    .chat-footer {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201, 164, 75, 0.15);
    }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      /* 16px minimum prevents iOS auto-zoom on focus */
      font-size: max(0.95rem, 16px);
      color: var(--text-primary);
      padding: 11px 0;
      caret-color: var(--accent);
    }

    #userInput::placeholder {
      color: var(--text-secondary);
      font-style: italic;
    }

    #sendBtn {
      width: 42px;
      height: 42px;
      min-width: 42px;
      border-radius: 12px;
      background: var(--send-bg);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }

    #sendBtn:hover  { background: var(--send-hover); }
    #sendBtn:active { transform: scale(0.92); }

    #sendBtn svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    #sendBtn:disabled {
      opacity: 0.45;
      pointer-events: none;
    }

    /* ── Mobile-specific ── */
    @media (max-width: 480px) {
      .message-row {
        max-width: 90%;
      }

      /* On very small phones, abbreviate the subtitle */
      .header-text span {
        display: none;
      }
    }

    /* Landscape phone */
    @media (max-height: 420px) {
      .top-header {
        min-height: 44px;
        padding: 6px 12px;
      }

      .cross-icon {
        width: 28px;
        height: 28px;
        min-width: 28px;
      }

      .header-text h1 { font-size: 0.95rem; }
      .header-text span { display: none; }

      .messages { padding: 8px 12px; gap: 6px; }
      .chat-footer { padding: 6px 12px; }
    }
  </style>
</head>

<body>
  <!-- Header -->
  <header class="top-header">
    <div class="header-left">
      <div class="cross-icon">
        
        <img class="cross-icon" srcset="./logo1.jpg" src="../logo1.jpg" alt="../logo1.jpg">
      </div>
      <div class="header-text">
        <h1>FBC OVOM Marriage Guidelines</h1>
        <span>Your step‑by‑step assistant</span>
      </div>
    </div>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
      <svg id="sunIcon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="1" x2="12" y2="3" />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1" y1="12" x2="3" y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
      </svg>
      <svg id="moonIcon" viewBox="0 0 24 24" style="display:none;">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
    </button>
  </header>

  <!-- Chat area -->
  <main class="chat-container">
    <div class="messages" id="messages">
      <div class="date-divider"><span>Today</span></div>
      <div class="message-row ai">
        <span class="sender-label">Guidelines Bot</span>
        <div class="bubble">
          Welcome! 🙏 I can walk you through the official <strong>FBC OVOM marriage steps</strong>.<br>How may I help you?
        </div>
        <span class="timestamp" id="initialTimestamp"></span>
      </div>
    </div>

    <div class="chat-footer">
      <div class="input-wrap">
        <input type="text" id="userInput" placeholder="Ask about requirements, steps, or documents…" autocomplete="off" />
      </div>
      <button id="sendBtn" aria-label="Send message">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
        </svg>
      </button>
    </div>
  </main>

  <script>
    (function () {
      const messagesEl   = document.getElementById('messages');
      const input        = document.getElementById('userInput');
      const sendBtn      = document.getElementById('sendBtn');
      const initialTs    = document.getElementById('initialTimestamp');
      const themeToggle  = document.getElementById('themeToggle');
      const sunIcon      = document.getElementById('sunIcon');
      const moonIcon     = document.getElementById('moonIcon');
      const html         = document.documentElement;

      const conversationHistory = [];

      /* ── Theme ── */
      const savedTheme = localStorage.getItem('theme') || 'light';
      html.setAttribute('data-theme', savedTheme);
      applyIcons(savedTheme);

      themeToggle.addEventListener('click', () => {
        const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        applyIcons(next);
      });

      function applyIcons(theme) {
        sunIcon.style.display  = theme === 'dark' ? 'block' : 'none';
        moonIcon.style.display = theme === 'dark' ? 'none'  : 'block';
      }

      initialTs.textContent = getTimeNow();

      function getTimeNow() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      /* ── Markdown-lite formatter ── */
      function formatResponse(text) {
        let safe = text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');

        safe = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        safe = safe.replace(/\*(.+?)\*/g,     '<em>$1</em>');

        return safe.split(/\n\n+/).map(para => {
          const lines = para.split('\n');
          if (lines.every(l => /^[-*] .+/.test(l.trim()))) {
            return `<ul>${lines.map(l => `<li>${l.replace(/^[-*] /, '')}</li>`).join('')}</ul>`;
          }
          if (lines.every(l => /^\d+\. .+/.test(l.trim()))) {
            return `<ol>${lines.map(l => `<li>${l.replace(/^\d+\. /, '')}</li>`).join('')}</ol>`;
          }
          return `<p>${lines.join('<br>')}</p>`;
        }).join('');
      }

      /* ── Message helpers ── */
      function addMessage(text, sender) {
        const row    = document.createElement('div');
        row.className = `message-row ${sender}`;

        const label  = document.createElement('span');
        label.className = 'sender-label';
        label.textContent = sender === 'you' ? 'You' : 'Guidelines Bot';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = sender === 'ai'
          ? formatResponse(text)
          : text.replace(/\n/g, '<br>');

        const time   = document.createElement('span');
        time.className = 'timestamp';
        time.textContent = getTimeNow();

        row.appendChild(label);
        row.appendChild(bubble);
        row.appendChild(time);
        messagesEl.appendChild(row);
        scrollToBottom();
      }

      function showTypingIndicator() {
        const indicator = document.createElement('div');
        indicator.className = 'message-row ai';
        indicator.id = 'typingIndicator';

        const label = document.createElement('span');
        label.className = 'sender-label';
        label.textContent = 'Guidelines Bot';

        const dots = document.createElement('div');
        dots.className = 'typing-indicator';
        dots.innerHTML = '<span></span><span></span><span></span>';

        indicator.appendChild(label);
        indicator.appendChild(dots);
        messagesEl.appendChild(indicator);
        scrollToBottom();
      }

      function removeTypingIndicator() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
      }

      function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function setLoadingState(loading) {
        input.disabled   = loading;
        sendBtn.disabled = loading;
        if (!loading) input.focus();
      }

      /* ── Send ── */
      async function sendMessage() {
        const text = input.value.trim();
        if (!text || input.disabled) return;

        addMessage(text, 'you');
        conversationHistory.push({ role: 'user_input', content: [{ type: 'text', text }] });
        input.value = '';
        setLoadingState(true);
        showTypingIndicator();

        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, history: conversationHistory }),
          });

          if (!response.ok) throw new Error(`Server error ${response.status}`);

          const data    = await response.json();
          const aiReply = data.reply || data.response || 'I\u2019m sorry, I could not retrieve that information.';
          conversationHistory.push({ role: 'model_output', content: [{ type: 'text', text: aiReply }] });

          removeTypingIndicator();
          addMessage(aiReply, 'ai');
        } catch (err) {
          console.error(err);
          removeTypingIndicator();
          addMessage('I\u2019m having trouble connecting right now. Please try again later. 🙏', 'ai');
        } finally {
          setLoadingState(false);
        }
      }

      sendBtn.addEventListener('click', sendMessage);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      input.focus();
    })();
  </script>
</body>

</html>
